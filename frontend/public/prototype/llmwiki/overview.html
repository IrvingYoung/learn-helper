<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Wiki - 概览</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style type="text/tailwindcss">
    @theme {
      --font-display: 'Playfair Display', serif;
      --font-body: 'Source Sans 3', sans-serif;
      --color-warm-50: #faf9f7;
      --color-warm-100: #f5f3ef;
      --color-warm-200: #eae7e0;
      --color-warm-300: #d9d5cc;
      --color-warm-400: #b5b0a6;
      --color-warm-500: #8a857a;
      --color-warm-600: #6b665c;
      --color-warm-700: #4a4640;
      --color-warm-800: #2d2a26;
      --color-warm-900: #1a1815;
      --color-ink: #1a1815;
      --color-ink-light: #4a4640;
      --color-ink-muted: #8a857a;
      --color-accent: #c45c26;
      --color-accent-light: #e87d3a;
      --color-accent-bg: #fdf6f0;
      --color-node-filled: #2d7a3e;
      --color-node-partial: #c78a2a;
      --color-node-empty: #b5b0a6;
    }
  </style>
  <style>
    body { font-family: 'Source Sans 3', sans-serif; }
    .font-display { font-family: 'Playfair Display', serif; }
    .custom-scroll::-webkit-scrollbar { width: 5px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #d9d5cc; border-radius: 3px; }
  </style>
</head>
<body class="bg-warm-50 text-ink h-screen overflow-hidden">

  <!-- Top Navigation -->
  <header class="h-12 bg-white border-b border-warm-200 flex items-center justify-between px-5 flex-shrink-0">
    <div class="flex items-center gap-8">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 bg-accent rounded-md flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 19.477 5.754 20 7.5 20s3.332-.477 4.5-1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 19.477 18.247 20 16.5 20a3.5 3.5 0 01-3.5-3.5" />
          </svg>
        </div>
        <span class="font-display font-bold text-lg text-ink">LLM Wiki</span>
      </div>
      <nav class="flex gap-1">
        <a href="index.html" class="px-3 py-1.5 rounded-md text-sm font-medium bg-accent-bg text-accent transition-colors">
          知识库
        </a>
        <a href="browse.html" class="px-3 py-1.5 rounded-md text-sm font-medium text-ink-muted hover:text-ink hover:bg-warm-100 transition-colors">
          浏览
        </a>
        <a href="dashboard.html" class="px-3 py-1.5 rounded-md text-sm font-medium text-ink-muted hover:text-ink hover:bg-warm-100 transition-colors">
          仪表盘
        </a>
      </nav>
    </div>
  </header>

  <!-- Three Column Layout -->
  <div class="flex h-[calc(100vh-48px)]">
    <!-- Left Panel -->
    <div class="w-[300px] bg-white border-r border-warm-200 flex flex-col flex-shrink-0">
      <div class="p-3 border-b border-warm-200">
        <h2 class="font-display font-semibold text-sm text-ink">知识树</h2>
      </div>
      <div class="flex-1 overflow-y-auto custom-scroll p-2">
        <div class="flex items-center gap-1.5 px-2 py-1.5 rounded-md cursor-pointer hover:bg-warm-100 transition-colors">
          <button class="text-ink-muted hover:text-ink w-4 h-4 flex items-center justify-center">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
          </button>
          <span class="w-2 h-2 rounded-full bg-node-filled flex-shrink-0"></span>
          <span class="text-sm font-medium text-ink">Go</span>
          <span class="text-xs text-ink-muted ml-auto">(5)</span>
        </div>
        <div class="ml-4">
          <div class="flex items-center gap-1.5 px-2 py-1.5 rounded-md cursor-pointer hover:bg-warm-100 transition-colors">
            <button class="text-ink-muted hover:text-ink w-4 h-4 flex items-center justify-center">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
              </svg>
            </button>
            <span class="w-2 h-2 rounded-full bg-node-filled flex-shrink-0"></span>
            <span class="text-sm text-ink">goroutine</span>
          </div>
          <div class="ml-4">
            <div class="flex items-center gap-1.5 px-2 py-1.5 rounded-md cursor-pointer hover:bg-warm-100 transition-colors">
              <span class="w-4"></span>
              <span class="w-2 h-2 rounded-full bg-node-filled flex-shrink-0"></span>
              <span class="text-sm text-ink">GMP 模型</span>
            </div>
            <div class="flex items-center gap-1.5 px-2 py-1.5 rounded-md cursor-pointer hover:bg-warm-100 transition-colors">
              <span class="w-4"></span>
              <span class="w-2 h-2 rounded-full bg-node-partial flex-shrink-0"></span>
              <span class="text-sm text-ink">Channel</span>
            </div>
          </div>
        </div>
        <div class="mt-1">
          <div class="flex items-center gap-1.5 px-2 py-1.5 rounded-md cursor-pointer hover:bg-warm-100 transition-colors">
            <button class="text-ink-muted hover:text-ink w-4 h-4 flex items-center justify-center">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
              </svg>
            </button>
            <span class="w-2 h-2 rounded-full bg-node-partial flex-shrink-0"></span>
            <span class="text-sm font-medium text-ink">Redis</span>
            <span class="text-xs text-ink-muted ml-auto">(2)</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Middle Panel -->
    <div class="flex-1 min-w-[360px] bg-warm-50 flex flex-col">
      <div class="flex-1 overflow-y-auto custom-scroll p-4 space-y-4">
        <div class="text-center py-8">
          <div class="w-12 h-12 bg-accent rounded-xl flex items-center justify-center mx-auto mb-3">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 19.477 5.754 20 7.5 20s3.332-.477 4.5-1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 19.477 18.247 20 16.5 20a3.5 3.5 0 01-3.5-3.5" />
            </svg>
          </div>
          <h3 class="font-display font-semibold text-lg text-ink mb-1">概览</h3>
          <p class="text-sm text-ink-muted">这是你的知识库概览页面，由 AI 自动维护。</p>
        </div>
      </div>
      <div class="p-3 border-t border-warm-200 bg-white">
        <div class="flex items-end gap-2">
          <button class="p-2 text-ink-muted hover:text-ink rounded-lg hover:bg-warm-100 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 00-.586 1.414v.001a2 2 0 002 2h.001a2 2 0 001.414-.586l6.586-6.586" />
            </svg>
          </button>
          <div class="flex-1 relative">
            <textarea class="w-full border border-warm-300 rounded-xl px-4 py-2.5 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent transition-all" rows="1" placeholder="输入消息..." style="min-height: 40px;"></textarea>
          </div>
          <button class="p-2.5 bg-accent text-white rounded-xl hover:bg-accent-light transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Resize Handle -->
    <div class="w-1 cursor-col-resize hover:bg-accent transition-colors"></div>

    <!-- Right Panel -->
    <div class="w-[480px] bg-white border-l border-warm-200 flex flex-col flex-shrink-0">
      <div class="p-4 border-b border-warm-200">
        <h1 class="font-display font-bold text-xl text-ink">概览</h1>
        <div class="flex items-center gap-2 mt-1.5">
          <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-amber-50 text-amber-700 border border-amber-200">
            <span class="w-1.5 h-1.5 rounded-full bg-amber-500 mr-1"></span>
            草稿
          </span>
          <span class="text-xs text-ink-muted">自动维护</span>
        </div>
      </div>
      <div class="flex-1 overflow-y-auto custom-scroll p-4">
        <div class="bg-warm-50 rounded-xl border border-warm-200 p-6 mb-6">
          <h2 class="font-display font-semibold text-lg text-ink mb-4">知识库概览</h2>
          <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white rounded-lg p-4 border border-warm-200">
              <p class="text-xs text-ink-muted uppercase tracking-wide">总页面</p>
              <p class="font-display font-bold text-2xl text-ink mt-1">12</p>
            </div>
            <div class="bg-white rounded-lg p-4 border border-warm-200">
              <p class="text-xs text-ink-muted uppercase tracking-wide">覆盖率</p>
              <p class="font-display font-bold text-2xl text-accent mt-1">67%</p>
            </div>
          </div>

          <h3 class="font-semibold text-sm text-ink mb-3">领域分布</h3>
          <div class="space-y-3">
            <div>
              <div class="flex justify-between text-sm mb-1">
                <span class="text-ink">Go</span>
                <span class="text-ink-muted">5 页</span>
              </div>
              <div class="w-full bg-warm-200 rounded-full h-2">
                <div class="bg-accent h-2 rounded-full" style="width: 42%"></div>
              </div>
            </div>
            <div>
              <div class="flex justify-between text-sm mb-1">
                <span class="text-ink">Redis</span>
                <span class="text-ink-muted">2 页</span>
              </div>
              <div class="w-full bg-warm-200 rounded-full h-2">
                <div class="bg-accent h-2 rounded-full" style="width: 17%"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-xl border border-warm-200 p-6">
          <h3 class="font-display font-semibold text-base text-ink mb-4">最近更新</h3>
          <div class="space-y-3">
            <div class="flex items-start gap-3">
              <span class="w-2 h-2 rounded-full bg-green-500 mt-1.5 flex-shrink-0"></span>
              <div>
                <p class="text-sm text-ink">Channel - 新增基本用法章节</p>
                <p class="text-xs text-ink-muted">2 小时前</p>
              </div>
            </div>
            <div class="flex items-start gap-3">
              <span class="w-2 h-2 rounded-full bg-amber-500 mt-1.5 flex-shrink-0"></span>
              <div>
                <p class="text-sm text-ink">GMP 模型 - 补充调度流程图</p>
                <p class="text-xs text-ink-muted">5 小时前</p>
              </div>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-xl border border-warm-200 p-6 mt-6">
          <h3 class="font-display font-semibold text-base text-ink mb-4">待填充页面</h3>
          <div class="space-y-2">
            <div class="flex items-center gap-2 px-3 py-2 bg-warm-50 rounded-lg">
              <span class="w-2 h-2 rounded-full bg-node-empty flex-shrink-0"></span>
              <span class="text-sm text-ink-muted">Go / 数据类型</span>
            </div>
            <div class="flex items-center gap-2 px-3 py-2 bg-warm-50 rounded-lg">
              <span class="w-2 h-2 rounded-full bg-node-empty flex-shrink-0"></span>
              <span class="text-sm text-ink-muted">Redis / 持久化</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
