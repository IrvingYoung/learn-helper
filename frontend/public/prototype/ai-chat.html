<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn Helper - AI 对话</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .chat-message { animation: fadeIn 0.3s ease-out; }
    @keyframes typing {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .typing-dot { animation: typing 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  </style>
</head>
<body class="bg-gray-50 font-sans">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-14">
        <div class="flex items-center gap-6">
          <h1 class="text-lg font-semibold text-gray-900">Learn Helper</h1>
          <nav class="flex gap-1">
            <a href="learn.html" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-100 transition-colors">
              <span class="mr-1">📚</span>知识图谱
            </a>
            <a href="practice.html" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-100 transition-colors">
              <span class="mr-1">💻</span>练习题库
            </a>
            <a href="dashboard.html" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-100 transition-colors">
              <span class="mr-1">📊</span>学习仪表盘
            </a>
            <a href="settings.html" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-100 transition-colors">
              <span class="mr-1">⚙️</span>设置
            </a>
          </nav>
        </div>
        <button class="px-3 py-1.5 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 transition-colors">
          关闭 AI
        </button>
      </div>
    </div>
  </header>

  <!-- Main Layout -->
  <div class="flex h-[calc(100vh-3.5rem)]">

    <!-- Content Area (shrunk when AI panel open) -->
    <div class="flex-1 overflow-y-auto p-8">
      <div class="max-w-3xl mx-auto">
        <h1 class="text-2xl font-bold text-gray-900 mb-4">数组 (Array)</h1>
        <p class="text-gray-600 mb-6">这里显示知识点内容...</p>
      </div>
    </div>

    <!-- AI Chat Panel -->
    <div class="w-96 bg-white border-l border-gray-200 flex flex-col flex-shrink-0">

      <!-- Header -->
      <div class="flex items-center gap-2 p-3 border-b border-gray-200 bg-gray-50">
        <select class="flex-1 text-sm border border-gray-300 rounded px-2 py-1.5 bg-white">
          <option>知识讲解 - 数组</option>
          <option>解题辅导 - 两数之和</option>
        </select>
        <button class="p-1.5 text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded" title="新建会话">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
          </svg>
        </button>
      </div>

      <!-- Messages -->
      <div class="flex-1 overflow-y-auto p-4 space-y-4">
        <!-- AI Welcome -->
        <div class="chat-message flex justify-start">
          <div class="max-w-[85%] rounded-lg px-3 py-2 text-sm bg-gray-100 text-gray-800">
            你好！我是你的 AI 学习助手。关于「数组」这个知识点，你有什么问题吗？
          </div>
        </div>

        <!-- User Message -->
        <div class="chat-message flex justify-end">
          <div class="max-w-[85%] rounded-lg px-3 py-2 text-sm bg-blue-500 text-white">
            数组和链表有什么区别？
          </div>
        </div>

        <!-- AI Response -->
        <div class="chat-message flex justify-start">
          <div class="max-w-[85%] rounded-lg px-3 py-2 text-sm bg-gray-100 text-gray-800">
            <p class="mb-2">数组和链表是两种常见的线性数据结构，它们有以下几个主要区别：</p>
            <p class="font-medium mb-1">1. 内存分配</p>
            <ul class="list-disc list-inside mb-2 text-gray-700">
              <li>数组：连续的内存空间</li>
              <li>链表：非连续，通过指针连接</li>
            </ul>
            <p class="font-medium mb-1">2. 访问效率</p>
            <ul class="list-disc list-inside mb-2 text-gray-700">
              <li>数组：O(1) 随机访问</li>
              <li>链表：O(n) 顺序访问</li>
            </ul>
            <p class="font-medium mb-1">3. 插入删除</p>
            <ul class="list-disc list-inside text-gray-700">
              <li>数组：O(n) 需要移动元素</li>
              <li>链表：O(1) 只需修改指针</li>
            </ul>
          </div>
        </div>

        <!-- Typing Indicator -->
        <div class="flex justify-start">
          <div class="max-w-[85%] rounded-lg px-3 py-2 text-sm bg-gray-100">
            <div class="flex gap-1">
              <span class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></span>
              <span class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></span>
              <span class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="p-3 border-t border-gray-200">
        <div class="flex gap-2">
          <input
            type="text"
            class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
            placeholder="输入消息..."
          />
          <button class="px-4 py-2 rounded-lg text-sm font-medium text-white bg-blue-500 hover:bg-blue-600">
            发送
          </button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
